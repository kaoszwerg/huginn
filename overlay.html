<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Huginn</title>
    <!--
      The recording overlay (ADR-PROJ-004, phase-1a spike).

      It sits on top of someone else's work: it states the state and gets out of the way. No
      controls, therefore no UI primitives and no IPC — the window has no capability at all, which
      is the least privilege it can have (ADR-CORE-011).

      Colour comes only from the design-system tokens in globals.css (rule:design-system). Raw hex
      here would be a defect — and would also survive the palette replacement that ADR-PROJ-003
      still owes this project.
    -->
    <link rel="stylesheet" href="/src/styles/globals.css" />
    <style>
      html,
      body {
        margin: 0;
        height: 100%;
        /* The window is transparent; anything opaque here would paint a rectangle over the user's
           application. */
        background: transparent;
        overflow: hidden;
        /* The window is click-through (set_ignore_cursor_events); this keeps the caret cursor from
           ever appearing over it in the split second before that call lands. */
        user-select: none;
        cursor: default;
      }

      .overlay {
        display: flex;
        align-items: center;
        gap: 0.5rem;
        /* The bar IS the window: it fills it exactly, so there is no spare height to read as empty
           space. The padding is the only room around the text, and it is deliberately tight. */
        height: 100%;
        padding: 0 0.75rem;
        box-sizing: border-box;
        border-radius: 0.5rem;
        /* The overlay is dark in BOTH themes: it lies on top of a stranger's window, and flashing it
           white would be worse than useless (ADR-PROJ-004). It carries its own tokens for exactly
           this reason. */
        background: var(--huginn-overlay-bg);
        border: 1px solid var(--huginn-overlay-border);
        color: var(--huginn-overlay-text);
        font-family:
          system-ui,
          -apple-system,
          "Segoe UI",
          sans-serif;
        font-size: 0.8125rem;
        line-height: 1;
        white-space: nowrap;
      }

      /* No backdrop-filter: it is weak on Linux WebKitGTK and this must degrade to something solid
         (rule:cross-platform, rule:ui-design). */

      .pulse {
        width: 0.4375rem;
        height: 0.4375rem;
        flex: none;
        border-radius: 50%;
        background: var(--huginn-accent);
        animation: breathe 1.8s ease-in-out infinite;
      }

      /* The input-level meter: proof, while recording, that the voice is arriving and how strongly
         (ADR-PROJ-004). Driven by the backend via `window.__huginnLevel` — the overlay holds no IPC
         capability and cannot subscribe to anything; it is told the level, it never asks for it. */
      .meter {
        display: flex;
        align-items: flex-end;
        gap: 1.5px;
        flex: none;
        height: 0.75rem;
      }

      .meter .bar {
        width: 2px;
        height: 100%;
        flex: none;
        border-radius: 1px;
        background: var(--huginn-accent);
        /* Rests low and dim; the backend raises each bar as the level crosses its band. */
        transform: scaleY(0.18);
        transform-origin: bottom;
        opacity: 0.35;
        transition:
          transform 90ms ease-out,
          opacity 90ms ease-out;
      }

      @media (prefers-reduced-motion: reduce) {
        .meter .bar {
          transition: none;
        }
      }

      .hint {
        margin-left: auto;
        color: var(--huginn-overlay-dim);
        font-size: 0.75rem;
      }

      @keyframes breathe {
        0%,
        100% {
          opacity: 0.35;
        }
        50% {
          opacity: 1;
        }
      }

      @media (prefers-reduced-motion: reduce) {
        .pulse {
          animation: none;
          opacity: 0.9;
        }
      }
    </style>
  </head>
  <body>
    <div class="overlay">
      <span class="pulse" aria-hidden="true"></span>
      <!-- The input-level meter. Its bars are driven by the backend via `window.__huginnLevel`; when
           nothing drives them they rest low, which is a truthful "recording, but silent". -->
      <span class="meter" aria-hidden="true" data-overlay-meter>
        <span class="bar"></span>
        <span class="bar"></span>
        <span class="bar"></span>
        <span class="bar"></span>
        <span class="bar"></span>
      </span>
      <!-- Filled by src/overlay/main.ts from the language in the URL fragment. The German text is
           here as the fallback: if the script ever fails to load, the overlay says something rather
           than showing an empty bar over the user's work. -->
      <span role="status" data-overlay-state>Ich höre zu …</span>
      <span class="hint" data-overlay-hint>loslassen zum Einfügen</span>
    </div>
    <script type="module" src="/src/overlay/main.ts"></script>
  </body>
</html>
