<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <!--
    Huginn's mark (ADR-PROJ-003): a sound wave whose amplitudes trace the shape of a wing.

    What the product does (voice) in the shape of what it is named after. It is deliberately not an
    illustration of a raven: at 16px in a system tray an illustration is mud, and the tray is where
    this icon spends most of its life.

    This is the master. Every other size is generated from it (npm run icons), never hand-drawn: one
    source, no drift (ADR-CORE-005). This is also the one file where Huginn's colours are written as
    hex, because an .ico cannot resolve a CSS variable.

      ground  #14161a   (the dark theme's window ground)
      accent  #7fa0c4   (the dark theme's single accent)
  -->
  <rect width="1024" height="1024" rx="225" fill="#14161a" />
  <g fill="#7fa0c4">
    <rect x="128" y="464" width="64" height="96" rx="32" />
    <rect x="256" y="400" width="64" height="224" rx="32" />
    <rect x="384" y="288" width="64" height="448" rx="32" />
    <rect x="512" y="176" width="64" height="672" rx="32" />
    <rect x="640" y="304" width="64" height="416" rx="32" />
    <rect x="768" y="416" width="64" height="192" rx="32" />
  </g>
</svg>
