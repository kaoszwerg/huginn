# Backstop CI (ADR-CORE-008, rule:automation). Local pre-commit + pre-push run the full `check:all` and
# nothing is pushed unproven — this workflow re-runs the SAME gate only as the last line of defense
# against environment drift. It does NOT produce dev/intermediate builds (release.yml owns final
# builds). Exposed as `workflow_call` so a forked project can reference it by tag instead of copying.
name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_call:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  check:
    name: check:all
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Linux WebKit/Tauri build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            librsvg2-dev \
            patchelf \
            libayatana-appindicator3-dev

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install cargo audit tools
        run: cargo install cargo-deny cargo-audit --locked

      - name: Install npm dependencies
        run: npm ci

      - name: Run the full quality gate
        run: npm run check:all
